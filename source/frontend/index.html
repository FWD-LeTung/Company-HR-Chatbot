<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR-Chatbot</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1 class="app-title">Chatbot Ask HR</h1>
            </div>
            <button class="btn-new-chat" id="newChatBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
                Cuộc trò chuyện mới
            </button>
            <div class="chat-list" id="chatList">
                <div class="chat-item chat-item-placeholder">
                    Chưa có cuộc trò chuyện nào
                </div>
            </div>
            <div class="sidebar-footer">
                <button class="btn-theme-toggle" id="themeToggle">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 3a6 6 0 0 0 9 9 9 0 1 1-9-9Z"/>
                    </svg>
                    <span id="themeLabel">Chế độ tối</span>
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <div class="chat-header">
                <button class="btn-menu-mobile" id="menuToggle">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12h18M3 6h18M3 18h18"/>
                    </svg>
                </button>
                <h2 class="chat-title">AI Chatbot Assistant (Ask HR)</h2>
                <button class="btn-logout" id="logoutBtn" aria-label="Đăng xuất">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    <span>Đăng xuất</span>
                </button>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="message assistant">
                    <div class="message-content">
                        <p>Xin chào! Tôi là Trợ lý Nhân sự (Ask HR) của SVTECH. Tôi có thể giúp gì cho bạn?</p>
                    </div>
                </div>
            </div>
            <div class="chat-input-area">
                <div class="input-container">
                    <textarea
                        id="messageInput"
                        class="message-input"
                        placeholder="Nhập câu hỏi về chính sách nhân sự..."
                        rows="1"
                    ></textarea>
                    <button class="btn-send" id="sendBtn" disabled aria-label="Gửi tin nhắn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                        </svg>
                    </button>
                    <button class="btn-stop" id="stopBtn" style="display: none;" aria-label="Dừng trả lời">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="6" y="6" width="12" height="12"/>
                        </svg>
                    </button>
                </div>
                <div class="typing-indicator" id="typingIndicator" style="display: none;">
                    Đang trả lời...
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
