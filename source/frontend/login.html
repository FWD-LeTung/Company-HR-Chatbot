<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR-Chatbot</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="logo.png" alt="SVTECH Logo" style="width: 100%; max-width: 220px; height: auto; object-fit: contain; display: block; margin: 0 auto;">
                <p class="login-subtitle"> AI Chatbot (Ask HR)</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input
                        type="text"
                        id="username"
                        class="form-input"
                        placeholder="Nhập tên đăng nhập"
                        required
                        autocomplete="username"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        class="form-input"
                        placeholder="Nhập mật khẩu"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <div class="error-message" id="errorMessage" style="display: none;"></div>
                <div class="success-message" id="successMessage" style="display: none;"></div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="btn-text">Đăng nhập</span>
                    <span class="btn-loader" style="display: none;"></span>
                </button>
            </form>

            <div class="login-footer">
                <p>Đăng nhập để sử dụng AI Chatbot (Ask HR)</p>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
